# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    - id: end-of-file-fixer
      exclude: |
         (?x)^(
            src/tests/fuzzer/seed_corpus/.*|
            devops/docker/.*/Dockerfile
            )$
    - id: trailing-whitespace
      exclude: |
         (?x)(
          ^devops/docker/.*/Dockerfile$
         )
    - id: mixed-line-ending
      args: ['--fix', 'lf']
      exclude: |
         (?x)(
          ^devops/docker/.*/Dockerfile$
         )
      files: |
         (?x)(
          .*\.c|
          .*\.h|
          .*\.cpp|
          .*\.hpp|
          .*\.cs|
          .*\.md|
          .*\.cmake|
          .*\.toml|
          .*\.json|
          .*\.txt
            )$
    - id: mixed-line-ending
      args: ['--fix', 'crlf']
      files: |
         (?x)(
         .*\.cmd|
         .*\.csrpoj
         )$
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: clang-tidy
        types_or: [c++]
        args: ["--fix", "--", "-xc++", "-std=c++11", "-Isrc/common/logging/", "-Isrc/common/parson/", "-Isrc/modules/inc", "-Isrc/common/commonutils", "-Isrc/modules/compliance/src/lib"]
        files: |
          (?x)(
          ^src/modules/compliance/src/.*\.h$|
          ^src/modules/compliance/src/.*\.cpp$
            )
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v14.0.6
    hooks:
    - id: clang-format
      files: |
         (?x)(
          ^src/modules/compliance/.*\.h$|
          ^src/modules/compliance/.*\.cpp$
            )
