[build-system]
requires = ["setuptools>=59"]
build-backend = "setuptools.build_meta"

[project]
name = "compliance-engine"
version = "1.0.0"
description = "Python bindings for ComplianceEngine built-in procedures"
requires-python = ">=3.11"
dependencies = [
    "marshmallow",
    "marshmallow-dataclass",
]

[tool.setuptools]
py-modules = ["compliance_engine"]
